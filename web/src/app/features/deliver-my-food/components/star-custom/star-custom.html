<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient [id]="'gradient-' + id()" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(136, 211, 136)" />
      <stop [attr.offset]="starOffset()" stop-color="rgb(136, 211, 136)" />
      <stop [attr.offset]="starOffset()" stop-color="rgb(100,100,100)" />
    </linearGradient>
    <path
      [id]="'star-' + id()"
      d="M50 5 L61 35 L98 35 L68 57 L79 89 L50 70 L21 89 L32 57 L2 35 L39 35 L50 5"
      [attr.fill]="'url(#gradient-' + id() + ')'"
    />
  </defs>
  <use [attr.href]="'#star-' + id()" />
</svg>
