<main class="landing">
  <div class="container">
    <h1>Bienvenue sur <span>BlueProject</span></h1>
    <p class="subtitle">Une application web interactive, optimisée pour le bureau.</p>

    <div class="links">
      <a
        href="https://github.com/DamienBousquet/blue-project"
        class="github-link"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="fab fa-github"></i>
        <span>Voir sur GitHub</span>
      </a>
      @if (isOnMobile()) {
        <a class="cta-button-disabled">Accéder à l'application</a>
      }
      @if (!isOnMobile()) {
        <a routerLink="/blueproject" class="cta-button">Accéder à l'application</a>
      }
    </div>

    <p class="note">
      L'application disposant d'un bureau interactif, la version mobile n'est ainsi pas prévue.
    </p>
  </div>
</main>
