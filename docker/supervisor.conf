[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:delivery_behavior_producer]
command=php /var/www/html/bin/console app:delivery-person-behavior-worker
autostart=true
autorestart=true
user=www-data
directory=/var/www/html
stdout_logfile=/var/log/delivery_behavior.log
stderr_logfile=/var/log/delivery_behavior_error.log

[program:messenger_worker]
command= php /var/www/html/bin/console messenger:consume async -vv --limit=100 --time-limit=86400 --memory-limit=256M
process_name=%(program_name)s_%(process_num)02d
numprocs=5
autostart=true
autorestart=true
user=www-data
directory=/var/www/html
stdout_logfile=/var/log/messenger_worker.log
stderr_logfile=/var/log/messenger_worker_error.log