services:
  angular:
    build:
      context: ./web
      dockerfile: ../docker/angular.dockerfile
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    command: ng serve --host 0.0.0.0 --poll 2000

  php:
    build:
      context: .
      dockerfile: ./docker/php.dockerfile
    volumes:
      - ./src:/var/www/html
    expose:
      - "9000"

  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx.dockerfile
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - php

  db:
    build:
      context: .
      dockerfile: ./docker/db/db.dockerfile
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    ports:
      - "5432:5432"

  mercure:
    build:
      context: .
      dockerfile: ./docker/mercure.dockerfile
    environment:
      # Comment the following line to enable HTTPS
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "${MERCURE_JWT_SECRET}"
      MERCURE_SUBSCRIBER_JWT_KEY: "${MERCURE_JWT_SECRET}"
      MERCURE_EXTRA_DIRECTIVES: "cors_origins http://localhost:4200"
      MERCURE_ALLOW_ANONYMOUS: "1"
      MERCURE_CORS_ALLOW_CREDENTIALS: "1"

  osrm:
    build:
      context: .
      dockerfile: ./docker/osrm/osrm.dockerfile
    volumes:
      - ./docker/osrm/languedoc-roussillon.osm.pbf:/data/input.pbf:ro
      - osrm-data:/data/output
    ports:
      - "5000:5000"

volumes:
  osrm-data:
